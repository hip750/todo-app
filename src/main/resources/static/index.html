<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoリスト</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <h1>ToDoリスト</h1>

    <!-- 追加フォーム -->
    <div class="add-form">
        <input type="text" id="addTitle" placeholder="タイトル（必須）">
        <textarea id="addDescription" placeholder="詳細説明（任意）"></textarea>
        <div class="add-form-row">
            <label for="addDueDate">期限日：</label>
            <input type="date" id="addDueDate">
        </div>
        <button class="btn-add" id="btnAdd">＋ 追加</button>
    </div>

    <!-- 検索バー -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="タイトルで検索...">
        <button class="btn-clear-search" id="btnClearSearch">✕</button>
    </div>

    <!-- フィルター＋ソートを横並びに -->
    <div class="controls-row">
        <!-- フィルター（data-filter属性でJSから識別） -->
        <div class="filter-buttons">
            <button class="active" data-filter="all">すべて</button>
            <button data-filter="active">未完了</button>
            <button data-filter="completed">完了済み</button>
        </div>
        <!-- ソート（data-sort属性でJSから識別） -->
        <div class="sort-buttons">
            <button class="active" data-sort="desc">新しい順</button>
            <button data-sort="asc">古い順</button>
        </div>
    </div>

    <ul id="todoList"></ul>
    <div id="emptyState" class="empty-state" style="display:none;">ToDoがありません</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
